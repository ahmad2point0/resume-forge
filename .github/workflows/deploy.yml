name: Deploy to GitHub Pages

# The site is 100% static (no backend, no API - data lives in the browser),
# so it builds to static HTML and ships straight to GitHub Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for newer pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Create the Pages site on first run instead of requiring it to be
          # enabled beforehand in Settings -> Pages. Needs pages: write (set above).
          enablement: true

      - name: Derive base path
        # Project pages serve from /<repo>; user/org pages (<name>.github.io)
        # and custom domains serve from the root.
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO" == *.github.io ]]; then
            echo "NEXT_PUBLIC_BASE_PATH=" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_BASE_PATH=/$REPO" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        env:
          STATIC_EXPORT: "true"
        run: bun run build

      - name: Disable Jekyll (serve _next assets)
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-app/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
